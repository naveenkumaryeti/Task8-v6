# ============================================================
# .github/workflows/ci.yml
#
# Continuous Integration Pipeline
#
# Triggers:
#   - Push to main or develop branch
#   - Pull request to main
#   - Manual workflow dispatch
#
# Stages:
#   1. Code Validation (lint + test)
#   2. Docker Build
#   3. Security Scan (Trivy)
#   4. Push to Artifact Registry
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID       - GCP project ID
#   GCP_SA_KEY           - Base64-encoded service account JSON key
#                          (with Artifact Registry Writer + GKE access)
#   GCP_REGION           - e.g. asia-south1
#   GAR_REPO_NAME        - e.g. prod-repo
# ============================================================

name: CI — Build, Test, Scan, Push

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.2.0)'
        required: false
        default: ''

# Cancel in-progress runs on the same branch (save CI minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # These are safe to define here (non-secret)
  GCP_REGION:     ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REPO_NAME:  ${{ secrets.GAR_REPO_NAME || 'prod-repo' }}
  REGISTRY:       ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO_NAME || 'prod-repo' }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Code Quality & Tests
  # ════════════════════════════════════════════════════════════
  validate:
    name: Validate — Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint
        continue-on-error: false

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # JOB 2: Docker Build & Security Scan
  # ════════════════════════════════════════════════════════════
  build-and-scan:
    name: Build & Scan Docker Images
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    # Compute version from git tag, input, or commit SHA
    outputs:
      version:        ${{ steps.version.outputs.version }}
      frontend_image: ${{ steps.version.outputs.frontend_image }}
      backend_image:  ${{ steps.version.outputs.backend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Compute image version ──────────────────────────────────────────────
      - name: Compute version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"    # v1.2.0 → v1.2.0
          else
            # Use short SHA for non-tagged builds (e.g. feature branch push)
            VERSION="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi

          FRONTEND_IMAGE="${{ env.REGISTRY }}/frontend:${VERSION}"
          BACKEND_IMAGE="${{ env.REGISTRY }}/backend:${VERSION}"

          echo "version=$VERSION"               >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "backend_image=$BACKEND_IMAGE"   >> "$GITHUB_OUTPUT"

          echo "📦 Version: $VERSION"
          echo "🖼️  Frontend: $FRONTEND_IMAGE"
          echo "🖼️  Backend:  $BACKEND_IMAGE"

      # ── Docker BuildX for multi-platform support ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate with Artifact Registry ────────────────────────────────
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build Frontend ─────────────────────────────────────────────────────
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.version.outputs.frontend_image }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      # ── Build Backend ──────────────────────────────────────────────────────
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.version.outputs.backend_image }}
            ${{ env.REGISTRY }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      # ── Security Scan with Trivy ───────────────────────────────────────────
      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref:      ${{ steps.version.outputs.frontend_image }}
          format:         'sarif'
          output:         'trivy-frontend.sarif'
          severity:       'HIGH,CRITICAL'
          exit-code:      '0'
          ignore-unfixed: true

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref:      ${{ steps.version.outputs.backend_image }}
          format:         'sarif'
          output:         'trivy-backend.sarif'
          severity:       'HIGH,CRITICAL'
          exit-code:      '0'
          ignore-unfixed: true

      # ── Upload scan results to GitHub Security tab ─────────────────────────
      # FIX: Each upload-sarif call MUST have a unique `category` when the same
      #      tool (Trivy) produces multiple SARIF files in the same job.
      #      Without this GitHub rejects the second upload with:
      #      "only one run of upload-sarif is allowed per job per tool/category"
      - name: Upload frontend Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        with:
          sarif_file: trivy-frontend.sarif
          category:   trivy-frontend          # ← unique category for frontend

      - name: Upload backend Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy-backend           # ← unique category for backend

      # ── Push images ONLY after scan passes ────────────────────────────────
      - name: Push frontend image to Artifact Registry
        run: |
          docker push ${{ steps.version.outputs.frontend_image }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Push backend image to Artifact Registry
        run: |
          docker push ${{ steps.version.outputs.backend_image }}
          docker push ${{ env.REGISTRY }}/backend:latest

      - name: Print pushed image digests
        run: |
          docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ steps.version.outputs.frontend_image }} || true
          docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ steps.version.outputs.backend_image }} || true

  # ════════════════════════════════════════════════════════════
  # JOB 3: Notify (optional Slack/Teams notification)
  # ════════════════════════════════════════════════════════════
  notify:
    name: Notify — Build Status
    runs-on: ubuntu-latest
    needs: [validate, build-and-scan]
    if: always()

    steps:
      - name: CI Summary
        run: |
          echo "CI Pipeline completed"
          echo "Version:  ${{ needs.build-and-scan.outputs.version }}"
          echo "Frontend: ${{ needs.build-and-scan.outputs.frontend_image }}"
          echo "Backend:  ${{ needs.build-and-scan.outputs.backend_image }}"
          echo "Status:   ${{ needs.build-and-scan.result }}"