# ============================================================
# docker-compose.yml
#
# Local development environment — mirrors production architecture.
# NOT used in production (GKE handles orchestration there).
#
# Usage:
#   docker-compose up -d               # Start all services
#   docker-compose logs -f backend     # Tail backend logs
#   docker-compose down -v             # Stop and remove volumes
#
# Services:
#   frontend  → http://localhost:80
#   backend   → http://localhost:3000  (also via frontend proxy)
#   mysql     → localhost:3306
#   vault     → http://localhost:8200  (dev mode, no unseal needed)
# ============================================================
version: '3.9'

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mysql-data:       # Persistent MySQL data
  vault-data:       # Vault data (dev mode — not persistent across restarts)

# ── Custom network ────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "3306:3306"             # Exposed for local DB clients (TablePlus, DBeaver)

    environment:
      # Local dev only — Vault manages these in production
      MYSQL_ROOT_PASSWORD: devroot123       # NOT production — local dev only
      MYSQL_DATABASE:      appdb
      MYSQL_USER:          appuser
      MYSQL_PASSWORD:      devpass123       # NOT production — local dev only

    volumes:
      - mysql-data:/var/lib/mysql           # Persist data across restarts
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/mysql-configmap.yaml:/etc/mysql/conf.d/custom.cnf:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-pdevpass123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── HashiCorp Vault (Dev Mode) ─────────────────────────────────────────────
  # Dev mode: auto-initialized, auto-unsealed, in-memory storage
  # Root token: "dev-root-token" (set below)
  vault:
    image: hashicorp/vault:1.15
    container_name: dev-vault
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK             # Required by Vault for memory locking
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"

    # Seed dev secrets on startup
    # In production: vault-secrets.sh handles this against the real Vault
    command: >
      sh -c "
        vault server -dev -dev-root-token-id=dev-root-token -dev-listen-address=0.0.0.0:8200 &
        sleep 3
        export VAULT_ADDR=http://127.0.0.1:8200
        export VAULT_TOKEN=dev-root-token
        vault secrets enable -path=secret kv-v2 2>/dev/null || true
        vault kv put secret/mysql
          root_password='devroot123'
          app_password='devpass123'
          app_user='appuser'
          host='mysql'
          port='3306'
          database='appdb'
        vault kv put secret/app
          jwt_secret='dev-jwt-secret-change-in-production'
          session_secret='dev-session-secret-change-in-production'
          api_key='dev-api-key'
        echo 'Vault dev secrets seeded'
        wait
      "
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: dev-backend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "3000:3000"             # Exposed for direct API testing
    depends_on:
      mysql:
        condition: service_healthy
      vault:
        condition: service_healthy

    environment:
      NODE_ENV:     development
      PORT:         3000
      DB_HOST:      mysql
      DB_PORT:      3306
      DB_NAME:      appdb
      DB_USER:      appuser
      DB_PASSWORD:  devpass123    # Dev only — Vault injects this in production
      LOG_LEVEL:    debug
      APP_VERSION:  "1.0.0-dev"

    volumes:
      # Hot-reload in development (mount source, don't rebuild)
      - ./backend/src:/app/src:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dev-frontend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

    volumes:
      # Mount nginx.conf for live editing without rebuild
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/src:/usr/share/nginx/html:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
