# ============================================================
# Nginx Configuration — Production Frontend
#
# Responsibilities:
#   1. Serve static React/HTML assets
#   2. Reverse proxy /api/* requests to backend service
#   3. Health check endpoint for Kubernetes probes
#   4. Gzip compression, security headers
# ============================================================

# Run as non-root for security (matches Alpine nginx default)
user  nginx;
worker_processes  auto;          # Auto-detect CPU cores

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;    # Max simultaneous connections per worker
    use epoll;                   # Efficient I/O on Linux
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging Format ────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10M;

    # ── Gzip Compression ──────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream Backend (Kubernetes ClusterIP Service) ───────
    # "backend-service" resolves via Kubernetes DNS:
    #   <service-name>.<namespace>.svc.cluster.local
    upstream backend {
        server backend-service:3000;   # Port matches backend Service spec
        keepalive 32;                  # Reuse connections to backend
    }

    server {
        listen       80;
        server_name  _;               # Accept any hostname (behind LB)

        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ──────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Health Check Endpoint (Kubernetes probes hit this) ─
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"frontend"}';
            add_header Content-Type application/json;
        }

        # ── API Reverse Proxy ──────────────────────────────────
        # All /api/* requests forwarded to Node.js backend
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Required for keepalive connections
            proxy_set_header   Connection "";

            # Pass real client info to backend
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Static Files with Cache Headers ───────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── SPA Fallback ───────────────────────────────────────
        # Serve index.html for all unmatched routes (React Router support)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Error Pages ───────────────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
