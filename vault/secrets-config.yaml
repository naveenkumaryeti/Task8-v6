# ============================================================
# secrets-config.yaml
#
# Documents the Vault secret paths used by this application.
# This file is a REFERENCE ONLY — no actual secrets here.
#
# Vault secret structure (KV v2):
#
#   secret/
#   ├── mysql/                      # MySQL credentials
#   │   ├── root_password           # MySQL root password
#   │   └── app_password            # appuser password
#   ├── app/
#   │   ├── jwt_secret              # JWT signing key
#   │   ├── api_key                 # External API key
#   │   └── session_secret          # Express session secret
#   └── ci/
#       └── gke_sa_key              # GKE service account (base64 JSON)
#
# Populate secrets with: bash scripts/vault-secrets.sh
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-secret-paths
  namespace: production
  labels:
    app: vault-config
data:
  # Secret paths (not values — safe to store here)
  mysql-secret-path: "secret/data/mysql"
  app-secret-path: "secret/data/app"
  ci-secret-path: "secret/data/ci"

  # Vault agent template for backend pod
  # Generates a shell-sourceable file at /vault/secrets/app-creds
  backend-vault-template: |
    {{- with secret "secret/data/app" -}}
    export JWT_SECRET="{{ .Data.data.jwt_secret }}"
    export API_KEY="{{ .Data.data.api_key }}"
    export SESSION_SECRET="{{ .Data.data.session_secret }}"
    {{- end }}
    {{- with secret "secret/data/mysql" -}}
    export DB_PASSWORD="{{ .Data.data.app_password }}"
    export DB_USER="appuser"
    {{- end }}
